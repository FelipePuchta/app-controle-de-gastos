<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Adicionar — FinTrack</title>
  <link rel="stylesheet" href="_shared.css" />
  <style>
    /* ── Palco do valor ── */
    .value-stage {
      text-align: center;
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
    }
    .value-stage .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .value-input-wrap {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
    }
    .value-input-wrap .cur {
      font-size: 24px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: -0.02em;
    }
    #valor {
      font-family: var(--font);
      font-size: clamp(56px, 18vw, 80px);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 0.9;
      background: none; border: none; outline: none;
      color: var(--fg);
      width: 100%;
      max-width: 5em;
      text-align: center;
      caret-color: var(--accent);
      transition: color 0.2s var(--ease);
    }
    #valor.glow { color: #fff; }
    #valor::placeholder { color: rgba(255,255,255,0.15); }

    /* Atalhos */
    .quick-vals {
      display: flex; gap: 6px;
      justify-content: center; flex-wrap: wrap;
      margin-top: 16px;
    }
    .quick-vals button {
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: transparent;
      transition: all 0.18s var(--ease);
    }
    .quick-vals button:hover { border-color: var(--border-str); color: var(--fg); }
    .quick-vals button:active { transform: scale(0.94); }

    /* ── Grid de categorias ── */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .cat-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 6px 14px;
      background: var(--bg);
      border: none;
      border-radius: 0;
      transition: background 0.18s var(--ease);
    }
    .cat-cell .e {
      display: flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
    }
    .cat-cell .e svg { width: 20px; height: 20px; }
    .cat-cell .n {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      text-align: center;
      line-height: 1.2;
    }
    .cat-cell:active { background: rgba(255,255,255,0.04); }
    .cat-cell.active {
      background: rgba(255,255,255,0.05);
    }
    .cat-cell.active .n { color: var(--fg); }

    /* ── Overlay de confirmação ── */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 300;
      display: none;
      align-items: flex-end; justify-content: center;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
    }
    .confirm-overlay.show { display: flex; }
    .confirm-card {
      width: 100%;
      max-width: var(--app-max);
      padding: 40px 32px calc(48px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      text-align: center;
      animation: slide-up 0.45s var(--ease) both;
    }
    .check-ring {
      width: 72px; height: 72px; margin: 0 auto 24px;
      border: 1px solid var(--accent);
      display: grid; place-items: center;
      animation: pop 0.45s var(--ease) both;
    }
    .check-ring svg { width: 36px; height: 36px; color: var(--accent); }
    .check-ring svg path {
      stroke-dasharray: 40; stroke-dashoffset: 40;
      animation: draw 0.5s 0.18s var(--ease) forwards;
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes slide-up {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .confirm-card h2 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      margin-bottom: 10px;
      animation: rise 0.4s 0.1s var(--ease) both;
    }
    .confirm-card .amt {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      animation: rise 0.4s 0.16s var(--ease) both;
    }
    .confirm-card .meta {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.06em;
      margin-bottom: 32px;
      animation: rise 0.4s 0.22s var(--ease) both;
    }
    .confirm-actions {
      display: flex; flex-direction: column; gap: 8px;
      animation: rise 0.4s 0.28s var(--ease) both;
    }

    /* Seção form */
    .form-section {
      padding-top: 28px;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">Novo registro</div>
        <h1>Adicionar</h1>
      </div>
      <a href="dashboard.html" class="btn btn-ghost">Cancelar</a>
    </header>

    <div class="screen">
      <form id="form-gasto" autocomplete="off">

        <!-- Valor -->
        <div class="value-stage">
          <div class="label">Quanto você gastou?</div>
          <div class="value-input-wrap">
            <span class="cur">R$</span>
            <input id="valor" inputmode="decimal" placeholder="0" aria-label="Valor" />
          </div>
          <div class="quick-vals">
            <button type="button" data-add="10">+10</button>
            <button type="button" data-add="25">+25</button>
            <button type="button" data-add="50">+50</button>
            <button type="button" data-add="100">+100</button>
          </div>
        </div>

        <!-- Categoria -->
        <div class="field" style="margin-top:28px;">
          <label>Categoria</label>
          <div class="cat-grid" id="cat-grid"></div>
        </div>

        <!-- Descrição -->
        <div class="form-section">
          <div class="field">
            <label for="descricao">Descrição</label>
            <input class="input" id="descricao" type="text" placeholder="Ex.: Mercado da semana" />
          </div>

          <!-- Data -->
          <div class="field">
            <label for="data">Data</label>
            <input class="input" id="data" type="date" />
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="btn-salvar" style="margin-top:8px;">
            <span class="lbl">Salvar gasto</span>
          </button>
        </div>

      </form>
    </div>

    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="5" rx="1"/><rect x="13" y="10" width="8" height="11" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/></svg>
        Dashboard
      </a>
      <a href="adicionar.html" class="nav-item nav-add active" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Adicionar
      </a>
      <a href="gastos.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.2"/><circle cx="3.5" cy="12" r="1.2"/><circle cx="3.5" cy="18" r="1.2"/></svg>
        Gastos
      </a>
      <a href="analise.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><polyline points="7 16 11 10 15 14 19 8"/></svg>
        Análise
      </a>
      <a href="configuracoes.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Config
      </a>
    </nav>
  </main>

  <!-- Confirmação -->
  <div class="confirm-overlay" id="confirm">
    <div class="confirm-card">
      <div class="check-ring">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6.5"/></svg>
      </div>
      <h2>Salvo</h2>
      <div class="amt" id="confirm-amt">R$ 0,00</div>
      <div class="meta" id="confirm-meta">—</div>
      <div class="confirm-actions">
        <a href="gastos.html" class="btn btn-primary btn-block">Ver meus gastos</a>
        <button type="button" class="btn btn-ghost btn-block" id="btn-novo">Adicionar outro</button>
      </div>
    </div>
  </div>

  <script src="_shared.js"></script>
  <script>
    FinTrack.requireAuth();
    let categorias = [];
    let selectedCat = null;
    const $ = (s) => document.querySelector(s);
    const valorInput = $('#valor');
    const dataInput  = $('#data');

    (function setHoje() {
      const d = new Date();
      const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      dataInput.value = iso;
    })();

    valorInput.addEventListener('input', () => {
      let v = valorInput.value.replace(/[^\d,]/g, '');
      const parts = v.split(',');
      if (parts.length > 2) v = parts[0] + ',' + parts.slice(1).join('');
      if (parts[1]) v = parts[0] + ',' + parts[1].slice(0, 2);
      valorInput.value = v;
      valorInput.classList.toggle('glow', parseFloat(v.replace(',', '.')) > 0);
    });

    document.querySelectorAll('.quick-vals button').forEach(b => {
      b.addEventListener('click', () => {
        const cur  = parseFloat((valorInput.value || '0').replace(',', '.')) || 0;
        const next = cur + Number(b.dataset.add);
        valorInput.value = next.toFixed(2).replace('.', ',');
        valorInput.classList.add('glow');
      });
    });

    async function loadCategorias() {
      categorias = await FinTrack.getCategorias();
      const grid = $('#cat-grid');
      grid.innerHTML = '';
      categorias.forEach(c => {
        const meta = FinTrack.metaForCategoria(c.nome);
        const cell = document.createElement('button');
        cell.type = 'button';
        cell.className = 'cat-cell';
        cell.dataset.id = c.id;
        cell.innerHTML = `<span class="e" style="color:${meta.hex};">${FinTrack.iconForCategoria(c.nome)}</span><span class="n">${c.nome}</span>`;
        cell.addEventListener('click', () => {
          document.querySelectorAll('.cat-cell').forEach(x => x.classList.remove('active'));
          cell.classList.add('active');
          selectedCat = c;
        });
        grid.appendChild(cell);
      });
    }
    loadCategorias();

    $('#form-gasto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const valorNum = parseFloat((valorInput.value || '0').replace(',', '.'));
      const descricao = $('#descricao').value.trim();
      if (!valorNum || valorNum <= 0) { shake(valorInput.closest('.value-stage')); return; }
      if (!selectedCat) { shake($('#cat-grid')); return; }
      if (!descricao) { shake($('#descricao')); return; }

      const btn = $('#btn-salvar');
      btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:1.5px;"></span>';
      btn.disabled = true;

      await FinTrack.addGasto({ descricao, valor: valorNum, data: dataInput.value, categoria_id: selectedCat.id });

      $('#confirm-amt').textContent = FinTrack.formatBRL(valorNum);
      $('#confirm-meta').textContent = `${selectedCat.nome} · ${FinTrack.formatData(dataInput.value)}`;
      $('#confirm').classList.add('show');
      btn.innerHTML = '<span class="lbl">Salvar gasto</span>';
      btn.disabled = false;
    });

    $('#btn-novo').addEventListener('click', () => {
      $('#confirm').classList.remove('show');
      valorInput.value = '';
      valorInput.classList.remove('glow');
      $('#descricao').value = '';
      document.querySelectorAll('.cat-cell').forEach(x => x.classList.remove('active'));
      selectedCat = null;
      valorInput.focus();
    });

    function shake(el) {
      el.animate(
        [{ transform:'translateX(0)' },{ transform:'translateX(-6px)' },{ transform:'translateX(6px)' },{ transform:'translateX(0)' }],
        { duration: 280, easing: 'ease-in-out' }
      );
    }
  </script>
</body>
</html>
