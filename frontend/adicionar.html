<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Adicionar — FINTRACK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5c518">
<style>
.form-wrap{padding:1.5rem 1.25rem}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin-bottom:0.5rem}
.cat-btn{background:var(--grey2);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:0.9rem 0.5rem;display:flex;flex-direction:column;align-items:center;gap:0.4rem;cursor:pointer;transition:all 0.15s}
.cat-btn:active{transform:scale(0.96)}
.cat-btn.selected{border-color:var(--yellow);background:rgba(245,197,24,0.08)}
.cat-icon{font-size:1.3rem}
.cat-name{font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim)}
.cat-btn.selected .cat-name{color:var(--yellow)}

.valor-input{font-family:'Anton',sans-serif;font-size:2.5rem;background:none;border:none;color:var(--yellow);width:100%;text-align:center;padding:1.5rem 0;letter-spacing:-0.02em}
.valor-input:focus{outline:none}
.valor-input::placeholder{color:rgba(245,197,24,0.2)}
.valor-wrap{border-bottom:2px solid rgba(245,197,24,0.3);margin-bottom:2rem;position:relative}
.valor-prefix{position:absolute;left:0;top:50%;transform:translateY(-50%);font-family:'Anton',sans-serif;font-size:1.2rem;color:rgba(245,197,24,0.5)}

.success-screen{display:none;position:fixed;inset:0;background:var(--black);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem}
.success-screen.show{display:flex}
.success-icon{font-size:4rem;animation:pop 0.4s ease}
.success-title{font-family:'Anton',sans-serif;font-size:2.5rem;text-transform:uppercase;color:var(--yellow);letter-spacing:-0.02em}
.success-sub{color:var(--text-dim);font-size:0.9rem;letter-spacing:0.1em;text-transform:uppercase}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-tag">Novo registro</div>
  <div class="page-title">ADICIONAR<br>GASTO</div>
</div>

<div class="form-wrap">
  <div class="valor-wrap">
    <span class="valor-prefix">R$</span>
    <input type="number" step="0.01" class="valor-input" id="valor" placeholder="0,00">
  </div>

  <div class="form-group">
    <label class="form-label">Descrição</label>
    <input type="text" class="form-input" id="descricao" placeholder="Ex: Almoço, Uber, Netflix...">
  </div>

  <div class="form-group">
    <label class="form-label">Data</label>
    <input type="date" class="form-input" id="data">
  </div>

  <div class="form-group">
    <label class="form-label">Categoria</label>
    <div class="cat-grid" id="cat-grid">
      <div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>
    <input type="hidden" id="categoria-id">
  </div>

  <button class="btn btn-yellow" onclick="salvar()">Registrar gasto</button>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Início
  </a>
  <a href="dashboard.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a href="adicionar.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Adicionar
  </a>
  <a href="gastos.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Gastos
  </a>
</nav>

<div class="success-screen" id="success">
  <div class="success-icon">✅</div>
  <div class="success-title">Registrado!</div>
  <div class="success-sub">Gasto adicionado com sucesso</div>
</div>

<script>
const API = 'https://app-controle-de-gastos.railway.app';
const CAT_ICONS = {'Alimentação':'🍔','Transporte':'🚗','Lazer':'🎮','Moradia':'🏠','Saúde':'💊','Educação':'📚','Outros':'📦'};

// Data de hoje
document.getElementById('data').value = new Date().toISOString().split('T')[0];

async function loadCategorias() {
  const res = await fetch(`${API}/categorias`);
  const cats = await res.json();
  document.getElementById('cat-grid').innerHTML = cats.map(c => `
    <div class="cat-btn" onclick="selectCat(${c.id}, this)">
      <div class="cat-icon">${CAT_ICONS[c.nome] || '📦'}</div>
      <div class="cat-name">${c.nome}</div>
    </div>
  `).join('');
}

function selectCat(id, el) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('categoria-id').value = id;
}

async function salvar() {
  const descricao = document.getElementById('descricao').value.trim();
  const valor = parseFloat(document.getElementById('valor').value);
  const data = document.getElementById('data').value;
  const categoria_id = parseInt(document.getElementById('categoria-id').value);

  if (!descricao || !valor || !data || !categoria_id) {
    alert('Preencha todos os campos!');
    return;
  }

  try {
    const res = await fetch(`${API}/gastos`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({descricao, valor, data, categoria_id})
    });

    if (res.ok) {
      document.getElementById('success').classList.add('show');
      setTimeout(() => {
        document.getElementById('success').classList.remove('show');
        document.getElementById('descricao').value = '';
        document.getElementById('valor').value = '';
        document.getElementById('categoria-id').value = '';
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
      }, 2000);
    }
  } catch(e) {
    alert('Erro ao registrar gasto');
  }
}

loadCategorias();
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
