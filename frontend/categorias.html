<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Categorias — FINTRACK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5c518">
<style>
.cat-section{margin:1.25rem;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
.cat-header{background:var(--grey2);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06)}
.cat-header-left{display:flex;align-items:center;gap:0.75rem}
.cat-icon-big{font-size:1.5rem}
.cat-nome{font-family:'Anton',sans-serif;font-size:1.1rem;text-transform:uppercase;letter-spacing:0.05em}
.cat-total{font-family:'Anton',sans-serif;font-size:1.1rem;color:var(--yellow)}
.cat-gastos{background:var(--black)}
.cat-gasto-item{display:flex;justify-content:space-between;align-items:center;padding:0.85rem 1.25rem;border-bottom:1px solid rgba(255,255,255,0.04)}
.cat-gasto-item:last-child{border-bottom:none}
.cat-gasto-desc{font-size:0.9rem;flex:1}
.cat-gasto-meta{font-size:0.72rem;color:var(--text-dim);margin-top:0.15rem}
.cat-gasto-valor{font-size:0.9rem;font-weight:500;color:rgba(240,237,230,0.7)}
.cat-empty{padding:1.5rem;text-align:center;color:var(--text-dim);font-size:0.85rem}

.summary-bar{background:var(--yellow);padding:1rem 1.25rem;margin:1.25rem;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
.summary-label{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,0,0,0.5);font-weight:500}
.summary-value{font-family:'Anton',sans-serif;font-size:1.4rem;color:var(--black)}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-tag">Organização</div>
  <div class="page-title">CATEGO<br>RIAS</div>
</div>

<div id="summary"></div>
<div id="content">
  <div class="loading"><div class="spinner"></div>Carregando...</div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Início
  </a>
  <a href="dashboard.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a href="adicionar.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Adicionar
  </a>
  <a href="gastos.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Gastos
  </a>
</nav>

<script>
const API = 'https://app-controle-de-gastos.railway.app';
const CAT_ICONS = {'Alimentação':'🍔','Transporte':'🚗','Lazer':'🎮','Moradia':'🏠','Saúde':'💊','Educação':'📚','Outros':'📦'};

async function load() {
  try {
    const [cRes, gRes, totRes] = await Promise.all([
      fetch(`${API}/categorias`),
      fetch(`${API}/gastos`),
      fetch(`${API}/gastos/total/categoria`)
    ]);

    const cats = await cRes.json();
    const gastos = await gRes.json();
    const totais = await totRes.json();

    const totalGeral = totais.reduce((s, t) => s + (t.total || 0), 0);

    document.getElementById('summary').innerHTML = `
      <div class="summary-bar">
        <div class="summary-label">Total geral</div>
        <div class="summary-value">R$ ${totalGeral.toFixed(2).replace('.',',')}</div>
      </div>
    `;

    const html = cats.map(cat => {
      const gastosCat = gastos.filter(g => g.categoria_id === cat.id);
      const totalCat = totais.find(t => t.categoria === cat.nome);
      const total = totalCat ? totalCat.total : 0;

      const gastosHtml = gastosCat.length ? gastosCat
        .sort((a,b) => new Date(b.data) - new Date(a.data))
        .slice(0, 5)
        .map(g => `
          <div class="cat-gasto-item">
            <div>
              <div class="cat-gasto-desc">${g.descricao}</div>
              <div class="cat-gasto-meta">${new Date(g.data).toLocaleDateString('pt-BR')}</div>
            </div>
            <div class="cat-gasto-valor">R$ ${g.valor.toFixed(2).replace('.',',')}</div>
          </div>
        `).join('') : '<div class="cat-empty">Nenhum gasto nesta categoria</div>';

      return `
        <div class="cat-section fade-up">
          <div class="cat-header">
            <div class="cat-header-left">
              <div class="cat-icon-big">${CAT_ICONS[cat.nome] || '📦'}</div>
              <div class="cat-nome">${cat.nome}</div>
            </div>
            <div class="cat-total">R$ ${total.toFixed(2).replace('.',',')}</div>
          </div>
          <div class="cat-gastos">${gastosHtml}</div>
        </div>
      `;
    }).join('');

    document.getElementById('content').innerHTML = html;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">API offline</div></div>';
  }
}

load();
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
