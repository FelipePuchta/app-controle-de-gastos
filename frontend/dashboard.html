<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dashboard — FINTRACK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A0A0A">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'))</script>
<style>
.month-selector{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1.25rem;background:var(--surface);border-bottom:1px solid var(--border)}
.month-btn{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:6px;color:var(--yellow);font-size:1.1rem;cursor:pointer;padding:0.45rem 0.75rem;line-height:1;transition:background 0.15s}
.month-btn:active{background:var(--accent-bg);opacity:0.7}
.month-label{font-family:'Anton',sans-serif;font-size:1rem;letter-spacing:0.12em;text-transform:uppercase}

.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;padding:1.25rem}
.card-full{grid-column:1/-1}

.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.35rem;margin:0 1.25rem 1.25rem;box-shadow:0 2px 16px var(--shadow)}
.chart-title{font-size:0.6rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--text-dim);margin-bottom:1.35rem;display:flex;align-items:center;gap:0.5rem}
.chart-title::before{content:'';width:10px;height:1px;background:var(--yellow);opacity:0.5;flex-shrink:0}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:100px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.4rem}
.bar{width:100%;background:var(--divider);border-radius:4px 4px 0 0;transition:height 0.5s cubic-bezier(0.4,0,0.2,1);min-height:4px}
.bar.active{background:var(--yellow)}
.bar-label{font-size:0.52rem;color:var(--text-dim);letter-spacing:0.05em;text-align:center}

.donut-wrap{display:flex;align-items:center;gap:1.5rem}
.donut{width:100px;height:100px;flex-shrink:0}
.donut-legend{flex:1}
.legend-item{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.55rem}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legend-name{font-size:0.73rem;color:var(--text-dim);flex:1}
.legend-pct{font-size:0.73rem;font-weight:500}
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema">
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
</button>

<div class="page-header">
  <div class="page-tag">Visão geral</div>
  <div class="page-title">DASH<br>BOARD</div>
</div>

<div class="month-selector">
  <button class="month-btn" onclick="changeMonth(-1)">‹</button>
  <div class="month-label" id="month-label">Carregando...</div>
  <button class="month-btn" onclick="changeMonth(1)">›</button>
</div>

<div class="cards-grid" id="cards">
  <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Carregando...</div>
</div>

<div class="chart-container">
  <div class="chart-title">Evolução mensal</div>
  <div class="chart-bars" id="bars"></div>
</div>

<div class="chart-container">
  <div class="chart-title">Por categoria</div>
  <div class="donut-wrap">
    <svg class="donut" viewBox="0 0 36 36" id="donut"></svg>
    <div class="donut-legend" id="legend"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Início
  </a>
  <a href="dashboard.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a href="adicionar.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Adicionar
  </a>
  <a href="gastos.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Gastos
  </a>
</nav>

<script>
const API = 'https://app-controle-de-gastos-production.up.railway.app';
const COLORS = ['#7EC85A','#4E6B41','#3DBF5E','#8DC66A','#5BA840','#2D7A3E','#A0D885'];

let currentDate = new Date();

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function toggleTheme(){var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t)}

function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth() + dir);
  loadDashboard();
}

async function loadDashboard() {
  const mes = currentDate.getMonth() + 1;
  const ano = currentDate.getFullYear();
  document.getElementById('month-label').textContent = `${MONTHS[mes-1]} ${ano}`;

  try {
    const [totalRes, catRes, allRes] = await Promise.all([
      fetch(`${API}/gastos/total/mes/${mes}/${ano}`),
      fetch(`${API}/gastos/total/categoria`),
      fetch(`${API}/gastos`)
    ]);

    const totalData = await totalRes.json();
    const catData = await catRes.json();
    const allData = await allRes.json();

    const total = totalData.total || 0;
    const mesGastos = allData.filter(g => {
      const d = new Date(g.data);
      return d.getMonth() + 1 === mes && d.getFullYear() === ano;
    });
    const maior = mesGastos.length ? Math.max(...mesGastos.map(g => g.valor)) : 0;
    const qtd = mesGastos.length;

    document.getElementById('cards').innerHTML = `
      <div class="card card-full fade-up">
        <div class="card-label">Total do mês</div>
        <div class="card-value yellow">R$ ${total.toFixed(2).replace('.',',')}</div>
      </div>
      <div class="card fade-up" style="animation-delay:0.1s">
        <div class="card-label">Maior gasto</div>
        <div class="card-value">R$ ${maior.toFixed(2).replace('.',',')}</div>
      </div>
      <div class="card fade-up" style="animation-delay:0.2s">
        <div class="card-label">Registros</div>
        <div class="card-value">${qtd}</div>
      </div>
    `;

    const bars = document.getElementById('bars');
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(ano, mes - 1 - i, 1);
      months.push({m: d.getMonth() + 1, a: d.getFullYear(), label: MONTHS[d.getMonth()].slice(0,3)});
    }

    const totals = await Promise.all(months.map(m =>
      fetch(`${API}/gastos/total/mes/${m.m}/${m.a}`).then(r => r.json())
    ));

    const maxVal = Math.max(...totals.map(t => t.total || 0), 1);
    bars.innerHTML = months.map((m, i) => {
      const val = totals[i].total || 0;
      const pct = Math.max((val / maxVal) * 100, 4);
      const isActive = m.m === mes && m.a === ano;
      return `
        <div class="bar-wrap">
          <div class="bar ${isActive ? 'active' : ''}" style="height:${pct}px" title="R$ ${val.toFixed(2)}"></div>
          <div class="bar-label">${m.label}</div>
        </div>
      `;
    }).join('');

    if (catData.length) {
      const totalCat = catData.reduce((s, c) => s + (c.total || 0), 0);
      const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      const textFill = isDark ? '#F4F5F0' : '#0D0D0D';
      const trackStroke = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.08)';
      let offset = 25;
      const circles = catData.slice(0, 7).map((c, i) => {
        const pct = ((c.total || 0) / totalCat) * 100;
        const circle = `<circle cx="18" cy="18" r="15.9" fill="none" stroke="${COLORS[i]}" stroke-width="3.5" stroke-dasharray="${pct} ${100 - pct}" stroke-dashoffset="${offset}" stroke-linecap="round"/>`;
        offset -= pct;
        return circle;
      });

      document.getElementById('donut').innerHTML = `
        <circle cx="18" cy="18" r="15.9" fill="none" stroke="${trackStroke}" stroke-width="3.5"/>
        ${circles.join('')}
        <text x="18" y="20" text-anchor="middle" fill="${textFill}" font-size="5" font-family="Anton,sans-serif">R$${(total/1000).toFixed(1)}k</text>
      `;

      document.getElementById('legend').innerHTML = catData.slice(0, 7).map((c, i) => `
        <div class="legend-item">
          <div class="legend-dot" style="background:${COLORS[i]}"></div>
          <div class="legend-name">${c.categoria}</div>
          <div class="legend-pct" style="color:${COLORS[i]}">${(((c.total||0)/totalCat)*100).toFixed(0)}%</div>
        </div>
      `).join('');
    } else {
      document.getElementById('donut').innerHTML = '';
      document.getElementById('legend').innerHTML = '<div class="empty-text">Sem dados</div>';
    }

  } catch(e) {
    document.getElementById('cards').innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><div class="empty-text">API offline</div></div>';
  }
}

loadDashboard();
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
