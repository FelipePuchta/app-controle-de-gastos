<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Dashboard — FinTrack</title>
  <link rel="stylesheet" href="_shared.css" />
  <style>
    /* ---------- Seletor de mês/ano ---------- */
    .period {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 12px 14px; margin-bottom: 16px;
    }
    .period button.nav {
      width: 40px; height: 40px; border-radius: 11px;
      display: grid; place-items: center;
      background: rgba(240,237,230,0.04); border: 1px solid var(--border-soft);
      color: var(--text); transition: all 0.18s var(--ease);
    }
    .period button.nav:active { transform: scale(0.9); }
    .period button.nav:hover { border-color: var(--primary); }
    .period button.nav svg { width: 18px; height: 18px; }
    .period .cur { text-align: center; }
    .period .cur .m { font-family: var(--font-display); font-size: 26px; letter-spacing: 0.5px; line-height: 1; }
    .period .cur .y { font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; }

    /* ---------- Cards de estatística ---------- */
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .stat-card { padding: 16px; }
    .stat-card.wide { grid-column: 1 / -1; }
    .stat-card .cap { font-size: 11.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); font-weight: 600; }
    .stat-card .big { font-family: var(--font-display); font-size: 40px; color: var(--secondary); line-height: 1; margin-top: 8px; letter-spacing: 0.5px; }
    .stat-card.wide .big { font-size: 52px; }
    .stat-card .sub { font-size: 12.5px; color: var(--text-faint); margin-top: 6px; }
    .stat-card .sub b { color: var(--text-dim); font-weight: 600; }

    /* ---------- Seção de gráfico ---------- */
    .chart-card { padding: 18px; margin-bottom: 16px; }
    .chart-card .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .chart-card .head .t { font-size: 15px; font-weight: 600; }
    .chart-card .head .hint { font-size: 11.5px; color: var(--text-faint); }

    /* Gráfico de barras */
    .bars { display: flex; align-items: flex-end; gap: 6px; height: 150px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; justify-content: flex-end; }
    .bar-track { width: 100%; display: flex; align-items: flex-end; justify-content: center; flex: 1; }
    .bar {
      width: 78%;
      max-width: 30px;
      border-radius: 7px 7px 3px 3px;
      background: linear-gradient(180deg, var(--secondary), var(--primary));
      height: 0;
      transition: height 0.9s var(--ease);
      position: relative;
    }
    .bar.cur { box-shadow: 0 0 16px var(--glow); }
    .bar-col .vlabel { font-size: 9px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .bar-col .mlabel { font-size: 10px; color: var(--text-faint); font-weight: 600; }
    .bar-col.active .mlabel { color: var(--secondary); }

    /* Seletor de período do gráfico */
    .period-tabs { display: flex; gap: 6px; }
    .period-tab {
      flex: 1; height: 30px; border-radius: 8px; font-size: 12px; font-weight: 600;
      background: rgba(240,237,230,0.04); border: 1px solid var(--border-soft);
      color: var(--text-dim); transition: all 0.18s var(--ease);
    }
    .period-tab.active {
      background: rgba(74,103,65,0.22); border-color: var(--primary);
      color: var(--text);
    }

    /* Gráfico donut */
    .donut-wrap { display: flex; gap: 18px; align-items: center; }
    .donut { flex: 0 0 auto; position: relative; width: 132px; height: 132px; }
    .donut svg { transform: rotate(-90deg); }
    .donut .center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .donut .center .v { font-family: var(--font-display); font-size: 26px; color: var(--text); line-height: 1; }
    .donut .center .l { font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
    .legend { flex: 1; display: flex; flex-direction: column; gap: 9px; min-width: 0; }
    .legend-row { display: flex; align-items: center; gap: 9px; font-size: 13px; }
    .legend-row .sw { width: 11px; height: 11px; border-radius: 3px; flex: 0 0 auto; }
    .legend-row .nm { flex: 1; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .legend-row .pc { font-weight: 600; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">Visão geral</div>
        <h1>Dashboard</h1>
      </div>
    </header>

    <div class="screen">
      <div id="notice-slot"></div>

      <!-- Seletor de período -->
      <div class="period card">
        <button class="nav" id="prev" aria-label="Mês anterior">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
        </button>
        <div class="cur">
          <div class="m" id="per-mes">—</div>
          <div class="y" id="per-ano">—</div>
        </div>
        <button class="nav" id="next" aria-label="Próximo mês">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </div>

      <div id="content">
        <div class="loading-wrap"><div class="spinner"></div>Carregando relatórios...</div>
      </div>
    </div>

    <!-- ============ Navegação inferior ============ -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        Início
      </a>
      <a href="dashboard.html" class="nav-item active" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="5" rx="2"/><rect x="13" y="10" width="8" height="11" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/></svg>
        Dashboard
      </a>
      <a href="adicionar.html" class="nav-item nav-add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Adicionar
      </a>
      <a href="gastos.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.2"/><circle cx="3.5" cy="12" r="1.2"/><circle cx="3.5" cy="18" r="1.2"/></svg>
        Gastos
      </a>
    </nav>
  </main>

  <script src="_shared.js"></script>
  <script>
    const $ = (s) => document.querySelector(s);
    let gastos = [];
    let categorias = [];
    let catMap = {};
    const hoje = new Date();
    let curMes = hoje.getMonth() + 1;
    let curAno = hoje.getFullYear();
    let evolMeses = 6;

    async function init() {
      [gastos, categorias] = await Promise.all([FinTrack.getGastos(), FinTrack.getCategorias()]);
      catMap = FinTrack.buildCatMap(categorias);
      if (FinTrack.isDemo()) {
        $('#notice-slot').innerHTML =
          '<div class="notice">⚠️ <span>API indisponível — exibindo <b>dados de demonstração</b>.</span></div>';
      }
      render();
    }

    $('#prev').onclick = () => { curMes--; if (curMes < 1) { curMes = 12; curAno--; } render(); };
    $('#next').onclick = () => { curMes++; if (curMes > 12) { curMes = 1; curAno++; } render(); };

    function gastosDoMes(mes, ano) {
      return gastos.filter((g) => {
        const { mes: m, ano: a } = FinTrack.mesAnoDe(g.data);
        return m === mes && a === ano;
      });
    }

    function render() {
      $('#per-mes').textContent = FinTrack.MESES_LONGO[curMes - 1];
      $('#per-ano').textContent = curAno;

      const doMes = gastosDoMes(curMes, curAno);
      const total = doMes.reduce((s, g) => s + (Number(g.valor) || 0), 0);
      const maior = doMes.reduce((mx, g) => (Number(g.valor) > (mx ? Number(mx.valor) : -1) ? g : mx), null);
      const qtd = doMes.length;
      const media = qtd ? total / qtd : 0;

      // ---- Série dos últimos N meses ----
      const serie = [];
      let m = curMes, a = curAno;
      for (let i = 0; i < evolMeses; i++) {
        const t = gastosDoMes(m, a).reduce((s, g) => s + (Number(g.valor) || 0), 0);
        serie.unshift({ mes: m, ano: a, total: t, atual: i === 0 });
        m--; if (m < 1) { m = 12; a--; }
      }
      const maxSerie = Math.max(...serie.map((x) => x.total), 1);

      // ---- Totais por categoria ----
      const porCat = {};
      doMes.forEach((g) => { porCat[g.categoria_id] = (porCat[g.categoria_id] || 0) + (Number(g.valor) || 0); });
      const cats = Object.keys(porCat)
        .map((id) => ({ id: Number(id), total: porCat[id], meta: catMap[id] || FinTrack.metaForCategoria('') }))
        .sort((x, y) => y.total - x.total);

      // ---- Monta HTML ----
      let html = `
        <div class="stats stagger">
          <div class="card stat-card wide">
            <div class="cap">Total do mês</div>
            <div class="big" data-count="${total}">R$ 0,00</div>
            <div class="sub"><b>${qtd}</b> gastos · média de <b>${FinTrack.formatBRL(media)}</b></div>
          </div>
          <div class="card stat-card">
            <div class="cap">Maior gasto</div>
            <div class="big" style="font-size:30px;">${maior ? FinTrack.formatBRL(maior.valor) : 'R$ 0,00'}</div>
            <div class="sub">${maior ? escapeHtml(maior.descricao) : 'Sem registros'}</div>
          </div>
          <div class="card stat-card">
            <div class="cap">Quantidade</div>
            <div class="big">${qtd}</div>
            <div class="sub">lançamentos no mês</div>
          </div>
        </div>`;

      // Gráfico de barras
      const labelPeriodo = evolMeses === 3 ? '3 meses' : evolMeses === 6 ? '6 meses' : '1 ano';
      html += `
        <div class="card chart-card rise">
          <div class="head">
            <div class="t">Evolução · ${labelPeriodo}</div>
            <div class="period-tabs">
              <button class="period-tab ${evolMeses===3?'active':''}" data-n="3">3M</button>
              <button class="period-tab ${evolMeses===6?'active':''}" data-n="6">6M</button>
              <button class="period-tab ${evolMeses===12?'active':''}" data-n="12">1A</button>
            </div>
          </div>
          <div class="bars" id="bars">`;
      serie.forEach((s) => {
        const h = Math.round((s.total / maxSerie) * 100);
        html += `
          <div class="bar-col ${s.atual ? 'active' : ''}">
            <span class="vlabel">${s.total ? (s.total >= 1000 ? (s.total/1000).toFixed(1) + 'k' : Math.round(s.total)) : '–'}</span>
            <div class="bar-track"><div class="bar ${s.atual ? 'cur' : ''}" data-h="${h}"></div></div>
            <span class="mlabel">${FinTrack.MESES[s.mes - 1]}</span>
          </div>`;
      });
      html += `</div></div>`;

      // Gráfico donut
      html += `
        <div class="card chart-card rise" style="animation-delay:.08s;">
          <div class="head"><div class="t">Gastos por categoria</div><div class="hint">${FinTrack.MESES_LONGO[curMes-1]}</div></div>`;
      if (!cats.length) {
        html += '<div class="empty" style="padding:24px 0;"><div class="ic">🍃</div>Nenhum gasto neste mês.</div>';
      } else {
        const C = 2 * Math.PI * 52; // circunferência (r=52)
        let acc = 0;
        let segs = '';
        cats.forEach((c) => {
          const frac = c.total / total;
          const len = frac * C;
          segs += `<circle cx="66" cy="66" r="52" fill="none" stroke="${c.meta.hex}" stroke-width="16"
                     stroke-dasharray="${len} ${C - len}" stroke-dashoffset="${-acc}"
                     style="transition: stroke-dasharray .9s var(--ease); opacity:0;" data-len="${len}" data-c="${C}"></circle>`;
          acc += len;
        });
        let legend = '';
        cats.forEach((c) => {
          const pc = Math.round((c.total / total) * 100);
          legend += `
            <div class="legend-row">
              <span class="sw" style="background:${c.meta.hex}"></span>
              <span class="nm">${c.meta.nome || 'Outros'}</span>
              <span class="pc">${pc}%</span>
            </div>`;
        });
        html += `
          <div class="donut-wrap">
            <div class="donut">
              <svg viewBox="0 0 132 132" width="132" height="132">
                <circle cx="66" cy="66" r="52" fill="none" stroke="rgba(240,237,230,0.05)" stroke-width="16"></circle>
                ${segs}
              </svg>
              <div class="center"><div class="v">${cats.length}</div><div class="l">categorias</div></div>
            </div>
            <div class="legend">${legend}</div>
          </div>`;
      }
      html += `</div>`;

      $('#content').innerHTML = html;

      // ---- Botões de período do gráfico ----
      document.querySelectorAll('.period-tab').forEach((btn) => {
        btn.onclick = () => { evolMeses = Number(btn.dataset.n); render(); };
      });

      // ---- Animações de entrada ----
      requestAnimationFrame(() => {
        // contagem do total
        animateCount($('.stat-card.wide .big'), total);
        // barras
        setTimeout(() => {
          document.querySelectorAll('.bar').forEach((b) => { b.style.height = b.dataset.h + '%'; });
        }, 120);
        // donut (revela segmentos)
        setTimeout(() => {
          document.querySelectorAll('.donut circle[data-len]').forEach((c, i) => {
            setTimeout(() => { c.style.opacity = '1'; }, i * 90);
          });
        }, 200);
      });
    }

    /* Conta de 0 até o valor (efeito numérico) */
    function animateCount(el, target) {
      if (!el) return;
      const dur = 700, t0 = performance.now();
      function step(now) {
        const p = Math.min((now - t0) / dur, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = FinTrack.formatBRL(target * eased);
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    init();
  </script>
</body>
</html>
