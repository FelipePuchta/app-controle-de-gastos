<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Dashboard — FinTrack</title>
  <link rel="stylesheet" href="_shared.css" />
  <style>
    /* ── Seletor de período ── */
    .period {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .period button.nav {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--muted);
      transition: all 0.18s var(--ease);
    }
    .period button.nav:hover { border-color: var(--border-str); color: var(--fg); }
    .period button.nav:active { transform: scale(0.92); }
    .period button.nav svg { width: 16px; height: 16px; }
    .period .cur { text-align: center; }
    .period .cur .m {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      line-height: 1;
    }
    .period .cur .y {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.16em;
      margin-top: 3px;
      font-weight: 600;
    }

    /* ── Bloco total (hero do dashboard) ── */
    .total-hero {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
    }
    .total-hero .lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .total-hero .val {
      font-size: clamp(48px, 15vw, 72px);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 0.9;
      color: var(--fg);
    }
    .total-hero .meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 12px;
      letter-spacing: 0.04em;
    }
    .total-hero .meta b { color: rgba(255,255,255,0.70); font-weight: 600; }

    /* ── Stats em linha ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .stat-block {
      padding: 20px 0;
    }
    .stat-block:first-child {
      border-right: 1px solid var(--border);
      padding-right: 20px;
    }
    .stat-block:last-child { padding-left: 20px; }
    .stat-block .cap {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-block .val {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .stat-block .val.positive { color: #10B981; }
    .stat-block .val.negative { color: #EF4444; }
    .stat-block .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.02em;
    }

    /* ── Semana ── */
    .week-section {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .week-head {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .week-head .t {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.20em; text-transform: uppercase;
      color: var(--muted);
    }
    .week-delta {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.10em; text-transform: uppercase;
      padding: 3px 8px; border: 1px solid;
    }
    .week-delta.up   { color: #EF4444; border-color: rgba(239,68,68,0.25); }
    .week-delta.down { color: #10B981; border-color: rgba(16,185,129,0.25); }
    .week-delta.flat { color: var(--faint); border-color: rgba(255,255,255,0.08); }
    .week-bars {
      display: flex; gap: 4px; align-items: flex-end; height: 56px;
    }
    .wk-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
    .wk-bar-track { width: 100%; flex: 1; display: flex; align-items: flex-end; justify-content: center; }
    .wk-bar { width: 3px; background: rgba(255,255,255,0.18); height: 0; transition: height 0.8s var(--ease); }
    .wk-bar.today { background: var(--accent); width: 4px; }
    .wk-day-lbl { font-size: 7px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--faint); }
    .wk-col.today-col .wk-day-lbl { color: var(--accent); }

    /* ── Preview metas ── */
    .metas-preview {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .metas-preview-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .metas-preview-head .t {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.20em; text-transform: uppercase;
      color: var(--muted);
    }
    .meta-mini-row {
      display: flex; align-items: center; gap: 10px; padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .meta-mini-row:last-child { border-bottom: none; }
    .meta-mini-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .meta-mini-icon svg { width: 12px; height: 12px; }
    .meta-mini-name { font-size: 11px; font-weight: 600; flex: 1; color: var(--muted); letter-spacing: 0.04em; }
    .meta-mini-bar-wrap { width: 80px; height: 2px; background: rgba(255,255,255,0.07); flex-shrink: 0; }
    .meta-mini-bar-fill { height: 100%; transition: width 0.8s var(--ease); }
    .meta-mini-pct { font-size: 11px; font-weight: 800; letter-spacing: -0.01em; width: 34px; text-align: right; flex-shrink: 0; }

    /* ── Seção de gráfico ── */
    .chart-section {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .chart-head .t {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .period-tabs { display: flex; gap: 4px; }
    .period-tab {
      height: 26px;
      padding: 0 10px;
      border-radius: 0;
      font-family: var(--font);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      transition: all 0.18s var(--ease);
    }
    .period-tab.active {
      border-color: var(--fg);
      color: var(--fg);
    }

    /* Barras ultra-thin */
    .bars {
      display: flex;
      align-items: flex-end;
      gap: 0;
      height: 120px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-track {
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      flex: 1;
    }
    .bar {
      width: 2px;
      max-width: 2px;
      border-radius: 0;
      background: rgba(255,255,255,0.22);
      height: 0;
      transition: height 0.8s var(--ease);
    }
    .bar.cur { background: var(--accent); width: 3px; max-width: 3px; }
    .bar-col .vlabel {
      font-size: 8px;
      color: var(--faint);
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .bar-col .mlabel {
      font-size: 8px;
      color: var(--faint);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .bar-col.active .mlabel { color: var(--accent); }
    .bar-col.active .vlabel { color: rgba(255,255,255,0.55); }

    /* ── Seções clicáveis ── */
    .section-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: color 0.18s var(--ease);
    }
    .section-link:hover { color: var(--fg); }
    .section-link .arr-sm {
      font-size: 12px;
      opacity: 0.45;
      transition: opacity 0.18s var(--ease), transform 0.18s var(--ease);
    }
    .section-link:hover .arr-sm { opacity: 1; transform: translateX(3px); }

    /* ── Categorias ── */
    .cat-section {
      padding: 24px 0 0;
    }
    .cat-section-head {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* Donut ── mantido mas compacto */
    .donut-wrap {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .donut {
      flex: 0 0 auto;
      position: relative;
      width: 100px; height: 100px;
    }
    .donut svg { transform: rotate(-90deg); }
    .donut .center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .donut .center .v {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .donut .center .l {
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: 2px;
    }

    /* Legenda ── texto editorial */
    .legend { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }
    .legend-row .sw {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      flex: 0 0 auto;
    }
    .legend-row .sw svg { width: 14px; height: 14px; }
    .legend-row .nm {
      flex: 1;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .legend-row .pc {
      font-weight: 800;
      font-size: 13px;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    /* Compatibilidade com classes geradas pelo JS */
    .stats .card { display: none; }   /* esconde layout antigo, stats-row substitui */
    .chart-card { background: transparent; border: none; padding: 0; }
    .chart-card .head { display: none; }
    .stat-card { display: none; }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">Visão geral</div>
        <h1>Dashboard</h1>
      </div>
    </header>

    <div class="screen">
      <div id="notice-slot"></div>

      <!-- Seletor de período -->
      <div class="period card" style="background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:16px 0;">
        <button class="nav" id="prev" aria-label="Mês anterior">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
        </button>
        <div class="cur">
          <div class="m" id="per-mes">—</div>
          <div class="y" id="per-ano">—</div>
        </div>
        <button class="nav" id="next" aria-label="Próximo mês">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </div>

      <div id="content">
        <div class="loading-wrap"><div class="spinner"></div>Carregando</div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item active" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="5" rx="1"/><rect x="13" y="10" width="8" height="11" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/></svg>
        Dashboard
      </a>
      <a href="adicionar.html" class="nav-item nav-add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Adicionar
      </a>
      <a href="gastos.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.2"/><circle cx="3.5" cy="12" r="1.2"/><circle cx="3.5" cy="18" r="1.2"/></svg>
        Gastos
      </a>
      <a href="analise.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><polyline points="7 16 11 10 15 14 19 8"/></svg>
        Análise
      </a>
      <a href="configuracoes.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Config
      </a>
    </nav>
  </main>

  <script src="_shared.js"></script>
  <script>
    FinTrack.requireAuth();
    const $ = (s) => document.querySelector(s);
    let gastos = [], categorias = [], catMap = {}, metasMap = {};
    const hoje = new Date();
    let curMes = hoje.getMonth() + 1;
    let curAno  = hoje.getFullYear();
    let evolMeses = 6;

    async function init() {
      [gastos, categorias] = await Promise.all([FinTrack.getGastos(), FinTrack.getCategorias()]);
      catMap = FinTrack.buildCatMap(categorias);
      const metasList = await FinTrack.getMetas();
      metasList.forEach(m => { metasMap[m.categoria_id] = m.valor; });
      if (FinTrack.isDemo()) {
        $('#notice-slot').innerHTML =
          '<div class="notice"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><span>API indisponível — exibindo <b>dados de demonstração</b>.</span></div>';
      }
      render();
    }

    $('#prev').onclick = () => { curMes--; if (curMes < 1) { curMes = 12; curAno--; } render(); };
    $('#next').onclick = () => { curMes++; if (curMes > 12) { curMes = 1; curAno++; } render(); };

    function gastosDoMes(mes, ano) {
      return gastos.filter((g) => {
        const { mes: m, ano: a } = FinTrack.mesAnoDe(g.data);
        return m === mes && a === ano;
      });
    }

    function render() {
      $('#per-mes').textContent = FinTrack.MESES_LONGO[curMes - 1].toUpperCase();
      $('#per-ano').textContent = curAno;

      const doMes = gastosDoMes(curMes, curAno);
      const total = doMes.reduce((s, g) => s + (Number(g.valor) || 0), 0);
      const maior = doMes.reduce((mx, g) => (Number(g.valor) > (mx ? Number(mx.valor) : -1) ? g : mx), null);
      const qtd   = doMes.length;
      const media = qtd ? total / qtd : 0;

      // Série meses
      const serie = [];
      let m = curMes, a = curAno;
      for (let i = 0; i < evolMeses; i++) {
        const t = gastosDoMes(m, a).reduce((s, g) => s + (Number(g.valor) || 0), 0);
        serie.unshift({ mes: m, ano: a, total: t, atual: i === 0 });
        m--; if (m < 1) { m = 12; a--; }
      }
      const maxSerie = Math.max(...serie.map(x => x.total), 1);

      // Totais por categoria
      const porCat = {};
      doMes.forEach((g) => { porCat[g.categoria_id] = (porCat[g.categoria_id] || 0) + (Number(g.valor) || 0); });
      const cats = Object.keys(porCat)
        .map((id) => ({ id: Number(id), total: porCat[id], meta: catMap[id] || FinTrack.metaForCategoria('') }))
        .sort((x, y) => y.total - x.total);

      // ── Semana atual vs anterior ──
      const DIAS_CURTO = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
      const todayStr = hoje.toISOString().split('T')[0];
      const startOfWeek = new Date(hoje);
      startOfWeek.setDate(hoje.getDate() - hoje.getDay());
      const startOfLastWeek = new Date(startOfWeek);
      startOfLastWeek.setDate(startOfLastWeek.getDate() - 7);

      const weekDays = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(startOfWeek);
        d.setDate(d.getDate() + i);
        return d.toISOString().split('T')[0];
      });
      const lastWeekDays = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(startOfLastWeek);
        d.setDate(d.getDate() + i);
        return d.toISOString().split('T')[0];
      });

      const weekDayMap = {};
      gastos.forEach(g => {
        const d = String(g.data).split('T')[0];
        weekDayMap[d] = (weekDayMap[d] || 0) + Number(g.valor);
      });

      const totalSemana = weekDays.reduce((s, d) => s + (weekDayMap[d] || 0), 0);
      const totalSemanaPassada = lastWeekDays.reduce((s, d) => s + (weekDayMap[d] || 0), 0);
      const maxWeekDay = Math.max(...weekDays.map(d => weekDayMap[d] || 0), 1);

      let deltaPct = 0, deltaClass = 'flat', deltaLabel = 'igual';
      if (totalSemanaPassada > 0) {
        deltaPct = Math.round(((totalSemana - totalSemanaPassada) / totalSemanaPassada) * 100);
        if (deltaPct > 5)       { deltaClass = 'up';   deltaLabel = '+' + deltaPct + '%'; }
        else if (deltaPct < -5) { deltaClass = 'down'; deltaLabel = deltaPct + '%'; }
        else                    { deltaClass = 'flat'; deltaLabel = '='; }
      }

      // ── Metas preview ──
      const hasMetasCat = Object.keys(metasMap).length > 0;
      const spentByCat = {};
      doMes.forEach(g => { spentByCat[g.categoria_id] = (spentByCat[g.categoria_id] || 0) + Number(g.valor); });

      // ── HTML ──
      const labelPeriodo = evolMeses === 3 ? '3M' : evolMeses === 6 ? '6M' : '1A';

      let html = `
        <!-- Total hero -->
        <div class="total-hero rise">
          <div class="lbl">Total do mês</div>
          <div class="val" data-count="${total}">R$ 0,00</div>
          <div class="meta"><b>${qtd}</b> gastos · média <b>${FinTrack.formatBRL(media)}</b> por gasto</div>
        </div>

        <!-- Stats em linha -->
        <div class="stats-row rise" style="animation-delay:.06s;">
          <div class="stat-block">
            <div class="cap">Maior gasto</div>
            <div class="val">${maior ? FinTrack.formatBRL(maior.valor) : 'R$ 0,00'}</div>
            <div class="sub">${maior ? escapeHtml(maior.descricao) : 'Sem registros'}</div>
          </div>
          <div class="stat-block">
            <div class="cap">Média diária</div>
            <div class="val">${qtd ? FinTrack.formatBRL(total / new Date(curAno, curMes, 0).getDate()) : 'R$ 0,00'}</div>
            <div class="sub">estimado no mês</div>
          </div>
        </div>

        <!-- Semana atual -->
        <div class="week-section rise" style="animation-delay:.09s;">
          <div class="week-head">
            <span class="t">Esta semana</span>
            <span class="week-delta ${deltaClass}">${deltaLabel} vs semana passada</span>
          </div>
          <div class="week-bars">`;

      weekDays.forEach((d, i) => {
        const val = weekDayMap[d] || 0;
        const h = Math.round((val / maxWeekDay) * 100);
        const isToday = d === todayStr;
        html += `
          <div class="wk-col${isToday ? ' today-col' : ''}">
            <div class="wk-bar-track">
              <div class="wk-bar${isToday ? ' today' : ''}" data-h="${h}"></div>
            </div>
            <span class="wk-day-lbl">${DIAS_CURTO[i]}</span>
          </div>`;
      });

      html += `</div></div>`;

      html += `
        <!-- Gráfico de barras -->
        <div class="chart-section rise" style="animation-delay:.12s;">
          <div class="chart-head">
            <a href="evolucao.html" class="t section-link">Evolução <span class="arr-sm">→</span></a>
            <div class="period-tabs">
              <button class="period-tab ${evolMeses===3?'active':''}" data-n="3">3M</button>
              <button class="period-tab ${evolMeses===6?'active':''}" data-n="6">6M</button>
              <button class="period-tab ${evolMeses===12?'active':''}" data-n="12">1A</button>
            </div>
          </div>
          <div class="bars" id="bars">`;

      serie.forEach((s) => {
        const h = Math.round((s.total / maxSerie) * 100);
        html += `
          <div class="bar-col ${s.atual ? 'active' : ''}">
            <span class="vlabel">${s.total ? (s.total >= 1000 ? (s.total/1000).toFixed(1)+'k' : Math.round(s.total)) : '–'}</span>
            <div class="bar-track"><div class="bar ${s.atual ? 'cur' : ''}" data-h="${h}"></div></div>
            <span class="mlabel">${FinTrack.MESES[s.mes - 1]}</span>
          </div>`;
      });
      html += `</div></div>

        <!-- Preview metas -->
        ${hasMetasCat ? `
        <div class="metas-preview rise" style="animation-delay:.15s;">
          <div class="metas-preview-head">
            <a href="metas.html" class="t section-link">Metas do mês <span class="arr-sm">→</span></a>
          </div>
          ${Object.keys(metasMap).slice(0, 4).map(catId => {
            const meta = catMap[Number(catId)] || FinTrack.metaForCategoria('');
            const spent  = spentByCat[Number(catId)] || 0;
            const budget = metasMap[catId];
            const pct    = Math.min((spent / budget) * 100, 100);
            const color  = pct >= 100 ? '#EF4444' : pct >= 75 ? '#F97316' : '#10B981';
            return `<div class="meta-mini-row">
              <div class="meta-mini-icon" style="color:${meta.hex};">${FinTrack.iconForCategoria(meta.nome)}</div>
              <span class="meta-mini-name">${meta.nome || 'Outros'}</span>
              <div class="meta-mini-bar-wrap">
                <div class="meta-mini-bar-fill" style="width:${pct}%;background:${color};"></div>
              </div>
              <span class="meta-mini-pct" style="color:${color};">${Math.round(pct)}%</span>
            </div>`;
          }).join('')}
        </div>` : `
        <div class="metas-preview rise" style="animation-delay:.15s;">
          <div class="metas-preview-head">
            <a href="metas.html" class="t section-link">Metas <span class="arr-sm">→</span></a>
          </div>
          <div style="font-size:11px;color:var(--muted);letter-spacing:.04em;padding:4px 0 8px;">
            Defina orçamentos mensais por categoria
          </div>
        </div>`}

        <!-- Categorias -->
        <div class="cat-section rise" style="animation-delay:.18s;">
          <a href="por-categoria.html?mes=${curMes}&ano=${curAno}" class="cat-section-head section-link">Por categoria <span class="arr-sm">→</span></a>`;

      if (!cats.length) {
        html += '<div class="empty" style="padding:24px 0;color:var(--faint);font-size:12px;letter-spacing:.08em;">Nenhum gasto neste mês.</div>';
      } else {
        const C = 2 * Math.PI * 40;
        let acc = 0;
        let segs = '';
        cats.forEach((c) => {
          const frac = c.total / total;
          const len  = frac * C;
          segs += `<circle cx="50" cy="50" r="40" fill="none" stroke="${c.meta.hex}" stroke-width="12"
                     stroke-dasharray="${len} ${C - len}" stroke-dashoffset="${-acc}"
                     style="opacity:0;transition:stroke-dasharray .8s var(--ease);" data-len="${len}" data-c="${C}"></circle>`;
          acc += len;
        });

        let legend = '';
        cats.forEach((c) => {
          const pc = Math.round((c.total / total) * 100);
          legend += `
            <div class="legend-row">
              <span class="sw" style="color:${c.meta.hex};">${FinTrack.iconForCategoria(c.meta.nome)}</span>
              <span class="nm">${c.meta.nome || 'Outros'}</span>
              <span class="pc">${FinTrack.formatBRL(c.total)}</span>
            </div>`;
        });

        html += `
          <div class="donut-wrap">
            <div class="donut">
              <svg viewBox="0 0 100 100" width="100" height="100">
                <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="12"></circle>
                ${segs}
              </svg>
              <div class="center"><div class="v">${cats.length}</div><div class="l">categ.</div></div>
            </div>
            <div class="legend">${legend}</div>
          </div>`;
      }
      html += '</div>';

      $('#content').innerHTML = html;

      // Botões de período
      document.querySelectorAll('.period-tab').forEach(btn => {
        btn.onclick = () => { evolMeses = Number(btn.dataset.n); render(); };
      });

      // Animações
      requestAnimationFrame(() => {
        animateCount($('.total-hero .val'), total);
        setTimeout(() => {
          document.querySelectorAll('.bar').forEach(b => { b.style.height = b.dataset.h + '%'; });
          document.querySelectorAll('.wk-bar').forEach(b => { b.style.height = b.dataset.h + '%'; });
        }, 80);
        setTimeout(() => {
          document.querySelectorAll('.donut circle[data-len]').forEach((c, i) => {
            setTimeout(() => { c.style.opacity = '1'; }, i * 80);
          });
        }, 160);
      });
    }

    function animateCount(el, target) {
      if (!el) return;
      const dur = 650, t0 = performance.now();
      function step(now) {
        const p = Math.min((now - t0) / dur, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = FinTrack.formatBRL(target * eased);
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    }

    init();
  </script>
</body>
</html>
