<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gastos — FINTRACK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5c518">
<style>
.search-bar{padding:0.75rem 1.25rem;background:var(--grey2);border-bottom:1px solid rgba(255,255,255,0.06)}
.search-input{width:100%;background:var(--grey3);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:0.75rem 1rem;color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.95rem}
.search-input:focus{outline:none;border-color:var(--yellow)}
.search-input::placeholder{color:var(--text-dim)}

.filter-pills{display:flex;gap:0.5rem;padding:0.75rem 1.25rem;overflow-x:auto;scrollbar-width:none}
.filter-pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:0.4rem 0.9rem;border-radius:999px;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;border:1px solid rgba(255,255,255,0.1);color:var(--text-dim);background:none;cursor:pointer;transition:all 0.15s}
.pill.active{background:var(--yellow);color:var(--black);border-color:var(--yellow)}

.gastos-list{background:var(--grey2);margin:0 1.25rem;border-radius:8px;border:1px solid rgba(255,255,255,0.06);overflow:hidden}

.gasto-item{display:flex;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid rgba(255,255,255,0.05);gap:1rem;animation:fadeUp 0.3s ease forwards;opacity:0}
.gasto-item:last-child{border-bottom:none}
.gasto-icon{width:40px;height:40px;background:rgba(245,197,24,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.gasto-info{flex:1;min-width:0}
.gasto-desc{font-size:0.95rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gasto-meta{font-size:0.72rem;color:var(--text-dim);margin-top:0.2rem;display:flex;align-items:center;gap:0.5rem}
.gasto-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem}
.gasto-valor{font-family:'Anton',sans-serif;font-size:1.1rem;color:var(--yellow)}
.gasto-actions{display:flex;gap:0.4rem}
.action-btn{background:none;border:1px solid rgba(255,255,255,0.08);border-radius:4px;color:var(--text-dim);font-size:0.65rem;padding:0.25rem 0.5rem;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.15s}
.action-btn:active{transform:scale(0.95)}
.action-btn.del{border-color:rgba(255,60,60,0.3);color:rgba(255,100,100,0.7)}
.action-btn.del:active{background:rgba(255,60,60,0.1)}

.total-bar{background:var(--yellow);color:var(--black);padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;margin:1.25rem}
.total-bar-label{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:500}
.total-bar-value{font-family:'Anton',sans-serif;font-size:1.3rem}

/* MODAL EDIT */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--grey);border-radius:16px 16px 0 0;padding:1.5rem 1.25rem;width:100%;max-height:80dvh;overflow-y:auto}
.modal-title{font-family:'Anton',sans-serif;font-size:1.5rem;text-transform:uppercase;margin-bottom:1.5rem;letter-spacing:0.05em}
.modal-close{float:right;background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer;line-height:1}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-tag">Histórico</div>
  <div class="page-title">MEUS<br>GASTOS</div>
</div>

<div class="search-bar">
  <input type="text" class="search-input" placeholder="Buscar gasto..." id="search" oninput="filterGastos()">
</div>

<div class="filter-pills" id="pills">
  <button class="pill active" onclick="filterCat(null, this)">Todos</button>
</div>

<div id="total-bar"></div>

<div class="gastos-list" id="list">
  <div class="loading"><div class="spinner"></div>Carregando...</div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Início
  </a>
  <a href="dashboard.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a href="adicionar.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Adicionar
  </a>
  <a href="gastos.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Gastos
  </a>
</nav>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">Editar</div>
    <input type="hidden" id="edit-id">
    <div class="form-group">
      <label class="form-label">Valor</label>
      <input type="number" step="0.01" class="form-input" id="edit-valor" placeholder="0,00">
    </div>
    <div class="form-group">
      <label class="form-label">Data</label>
      <input type="date" class="form-input" id="edit-data">
    </div>
    <button class="btn btn-yellow" onclick="salvarEdicao()">Salvar</button>
  </div>
</div>

<script>
const API = 'https://app-controle-de-gastos-production.up.railway.app';
const CAT_ICONS = {'Alimentação':'🍔','Transporte':'🚗','Lazer':'🎮','Moradia':'🏠','Saúde':'💊','Educação':'📚','Outros':'📦'};

let allGastos = [];
let categorias = [];
let activeCat = null;

async function loadGastos() {
  try {
    const [gRes, cRes] = await Promise.all([
      fetch(`${API}/gastos`),
      fetch(`${API}/categorias`)
    ]);
    allGastos = await gRes.json();
    categorias = await cRes.json();

    const pills = document.getElementById('pills');
    categorias.forEach(c => {
      const b = document.createElement('button');
      b.className = 'pill';
      b.textContent = c.nome;
      b.onclick = () => filterCat(c.id, b);
      pills.appendChild(b);
    });

    renderGastos(allGastos);
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">API offline</div></div>';
  }
}

function getCatNome(id) {
  const c = categorias.find(c => c.id === id);
  return c ? c.nome : 'Outros';
}

function getCatIcon(id) {
  const nome = getCatNome(id);
  return CAT_ICONS[nome] || '📦';
}

function filterCat(id, btn) {
  activeCat = id;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  filterGastos();
}

function filterGastos() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = allGastos;
  if (activeCat) filtered = filtered.filter(g => g.categoria_id === activeCat);
  if (q) filtered = filtered.filter(g => g.descricao.toLowerCase().includes(q));
  renderGastos(filtered);
}

function renderGastos(list) {
  const total = list.reduce((s, g) => s + g.valor, 0);
  document.getElementById('total-bar').innerHTML = list.length ? `
    <div class="total-bar">
      <div class="total-bar-label">${list.length} gasto${list.length !== 1 ? 's' : ''}</div>
      <div class="total-bar-value">R$ ${total.toFixed(2).replace('.',',')}</div>
    </div>
  ` : '';

  if (!list.length) {
    document.getElementById('list').innerHTML = '<div class="empty"><div class="empty-icon">💸</div><div class="empty-text">Nenhum gasto encontrado</div></div>';
    return;
  }

  const sorted = [...list].sort((a, b) => new Date(b.data) - new Date(a.data));
  document.getElementById('list').innerHTML = sorted.map((g, i) => `
    <div class="gasto-item" style="animation-delay:${i * 0.04}s">
      <div class="gasto-icon">${getCatIcon(g.categoria_id)}</div>
      <div class="gasto-info">
        <div class="gasto-desc">${g.descricao}</div>
        <div class="gasto-meta">
          <span>${new Date(g.data).toLocaleDateString('pt-BR')}</span>
          <span>·</span>
          <span>${getCatNome(g.categoria_id)}</span>
        </div>
      </div>
      <div class="gasto-right">
        <div class="gasto-valor">R$ ${g.valor.toFixed(2).replace('.',',')}</div>
        <div class="gasto-actions">
          <button class="action-btn" onclick="editarGasto(${g.id}, ${g.valor}, '${g.data}')">Edit</button>
          <button class="action-btn del" onclick="deletarGasto(${g.id})">Del</button>
        </div>
      </div>
    </div>
  `).join('');
}

function editarGasto(id, valor, data) {
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-valor').value = valor;
  document.getElementById('edit-data').value = data;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

async function salvarEdicao() {
  const id = document.getElementById('edit-id').value;
  const valor = parseFloat(document.getElementById('edit-valor').value);
  const data = document.getElementById('edit-data').value;
  try {
    await fetch(`${API}/gastos/${id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({valor, data})
    });
    closeModal();
    loadGastos();
  } catch(e) { alert('Erro ao atualizar'); }
}

async function deletarGasto(id) {
  if (!confirm('Deletar este gasto?')) return;
  try {
    await fetch(`${API}/gastos/${id}`, {method: 'DELETE'});
    loadGastos();
  } catch(e) { alert('Erro ao deletar'); }
}

loadGastos();
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
