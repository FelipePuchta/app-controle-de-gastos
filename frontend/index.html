<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FinTrack" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="FinTrack — controle seus gastos pessoais com clareza." />
  <link rel="manifest" href="manifest.json" />
  <title>FinTrack — Controle de Gastos</title>

  <!-- Fonte Sora (estilo C6 Bank) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" />

  <link rel="stylesheet" href="_shared.css" />

  <!-- Splash screen (uma vez por sessão) -->
  <script>
    (function () {
      if (sessionStorage.getItem('ft-splash')) return;
      sessionStorage.setItem('ft-splash', '1');
      document.addEventListener('DOMContentLoaded', function () {
        var el = document.createElement('div');
        el.id = 'ft-splash';
        el.innerHTML = '<div class="s-mark">F</div><div class="s-name">FINTRACK</div><div class="s-bar"></div>';
        document.body.prepend(el);
        el.addEventListener('animationend', function (e) { if (e.animationName === 'splash-out') el.remove(); });
      });
    })();
  </script>

  <style>
    /* Sobrescreve fontes globais para esta página */
    :root {
      --font-display: 'Sora', system-ui, sans-serif;
      --font-body:    'Sora', system-ui, sans-serif;
    }

    /* ===== Reset da landing ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0ede6;
      font-family: 'Sora', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    /* Container centralizado no estilo do app */
    .landing {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(240,237,230,0.06);
      border-right: 1px solid rgba(240,237,230,0.06);
      position: relative;
    }

    /* Gradiente de fundo sutil */
    .landing::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(800px 500px at 50% -5%, rgba(74,103,65,0.12), transparent 60%);
      z-index: 0;
    }
    .landing > * { position: relative; z-index: 1; }

    /* ===== Navbar ===== */
    .navbar {
      display: flex;
      align-items: center;
      padding: max(24px, env(safe-area-inset-top) + 14px) 28px 20px;
    }
    .navbar .wordmark {
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #f0ede6;
    }
    .navbar .wordmark span { color: #6b8f5e; }

    /* ===== Hero ===== */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px 28px 28px;
      gap: 36px;
    }

    /* Duas colunas lado a lado */
    .hero-cols {
      display: flex;
      align-items: flex-start;
      gap: 22px;
    }

    .hero-left { flex: 0 0 54%; }

    .hero-left h1 {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: clamp(36px, 11vw, 44px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: #f0ede6;
    }
    .hero-left h1 .accent { color: #6b8f5e; }

    .hero-right {
      flex: 1;
      padding-top: 6px;
    }
    .hero-right p {
      font-size: 13px;
      font-weight: 400;
      color: #9a978f;
      line-height: 1.7;
    }

    /* Linha divisória sutil */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(74,103,65,0.6) 0%, rgba(74,103,65,0.15) 60%, transparent 100%);
    }

    /* ===== CTA ===== */
    .cta-section {
      padding: 0 28px max(36px, env(safe-area-inset-bottom) + 24px);
    }

    .btn-cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 60px;
      padding: 0 26px;
      background: #4a6741;
      border-radius: 14px;
      color: #f0ede6;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      box-shadow: 0 8px 28px rgba(74,103,65,0.38);
      transition: background 0.2s, transform 0.18s, box-shadow 0.2s;
      animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) 0.2s both;
    }
    .btn-cta:active { transform: scale(0.98); }
    .btn-cta:hover  { background: #587d4d; box-shadow: 0 12px 36px rgba(74,103,65,0.5); }
    .btn-cta .arrow { font-size: 20px; font-weight: 300; }

    /* Animação de entrada do hero */
    .hero-cols  { animation: rise 0.55s cubic-bezier(0.22,1,0.36,1) 0.05s both; }
    .divider    { animation: rise 0.45s cubic-bezier(0.22,1,0.36,1) 0.15s both; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="landing">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="wordmark">Fin<span>Track</span></div>
    </nav>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-cols">
        <div class="hero-left">
          <h1>Controle<br>total do<br>seu<br><span class="accent">dinheiro.</span></h1>
        </div>
        <div class="hero-right">
          <p>FinTrack é o app que te ajuda a visualizar, organizar e controlar seus gastos pessoais em tempo real. Simples, rápido e eficiente.</p>
        </div>
      </div>

      <div class="divider"></div>
    </section>

    <!-- CTA -->
    <div class="cta-section">
      <a href="dashboard.html" class="btn-cta">
        <span>Acessar o app</span>
        <span class="arrow">→</span>
      </a>
    </div>

  </div>
</body>
</html>
