<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Por Categoria — FinTrack</title>
  <link rel="stylesheet" href="_shared.css" />
  <style>
    /* ── Topbar ── */
    .topbar-back {
      display: flex; align-items: center; gap: 0;
      height: 56px;
      padding: max(16px, env(safe-area-inset-top) + 8px) 24px 0;
      border-bottom: 1px solid var(--border);
      justify-content: space-between;
    }
    .btn-back {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      transition: color 0.18s var(--ease);
      padding-bottom: 16px;
    }
    .btn-back:hover { color: var(--fg); }
    .btn-back svg { width: 16px; height: 16px; }

    /* Seletor de mês */
    .period-nav {
      display: flex; align-items: center; gap: 8px;
      padding-bottom: 16px;
    }
    .period-nav button {
      width: 28px; height: 28px; display: grid; place-items: center;
      background: transparent; border: 1px solid var(--border); border-radius: 0;
      color: var(--muted); transition: all 0.18s var(--ease);
    }
    .period-nav button:hover { border-color: var(--border-str); color: var(--fg); }
    .period-nav button svg { width: 14px; height: 14px; }
    .period-nav .per {
      font-size: 12px; font-weight: 800; letter-spacing: -0.01em;
      color: var(--fg); text-align: center; min-width: 80px;
      text-transform: uppercase;
    }

    /* ── Hero do mês ── */
    .mes-hero {
      padding: 24px 0 18px;
      border-bottom: 1px solid var(--border);
    }
    .mes-hero .lbl {
      font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .mes-hero .val {
      font-size: clamp(40px, 13vw, 56px);
      font-weight: 800; letter-spacing: -0.05em; line-height: 0.9;
    }
    .mes-hero .meta {
      font-size: 11px; color: var(--muted); margin-top: 10px; letter-spacing: 0.04em;
    }

    /* ── Donut compacto centrado ── */
    .donut-center {
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
    }
    .donut {
      position: relative; width: 120px; height: 120px;
    }
    .donut svg { transform: rotate(-90deg); }
    .donut .center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .donut .center .v {
      font-size: 24px; font-weight: 800; letter-spacing: -0.04em; line-height: 1;
    }
    .donut .center .l {
      font-size: 8px; color: var(--muted); letter-spacing: 0.14em;
      text-transform: uppercase; font-weight: 700; margin-top: 2px;
    }

    /* ── Blocos de categoria ── */
    .cat-blocks { padding-top: 8px; }

    .cat-block {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      animation: rise 0.35s var(--ease) both;
    }

    .cat-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .cat-ic {
      width: 36px; height: 36px; border-radius: 0;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid currentColor;
      opacity: 0.7;
      flex-shrink: 0;
    }
    .cat-ic svg { width: 18px; height: 18px; }
    .cat-info { flex: 1; min-width: 0; }
    .cat-nome {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 4px;
    }
    .cat-total {
      font-size: 22px; font-weight: 800; letter-spacing: -0.04em; line-height: 1;
    }
    .cat-right { text-align: right; flex-shrink: 0; }
    .cat-pct {
      font-size: 24px; font-weight: 800; letter-spacing: -0.04em; line-height: 1;
    }
    .cat-qtd {
      font-size: 10px; color: var(--muted); font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px;
    }

    /* Barra de progresso */
    .prog-track {
      height: 1px; background: rgba(255,255,255,0.08); margin-bottom: 14px;
    }
    .prog-fill {
      height: 1px; width: 0;
      transition: width 0.8s var(--ease);
    }

    /* Lista de gastos dentro da categoria */
    .cat-gastos { display: flex; flex-direction: column; gap: 0; }
    .cg-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .cg-item:last-child { border-bottom: none; }
    .cg-desc {
      flex: 1; font-size: 13px; font-weight: 500; letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--fg);
    }
    .cg-data {
      font-size: 10px; color: var(--faint); font-weight: 600;
      letter-spacing: 0.06em; white-space: nowrap;
    }
    .cg-amt {
      font-size: 13px; font-weight: 800; letter-spacing: -0.02em;
      white-space: nowrap; color: var(--fg);
    }

    /* Estado vazio */
    .vazio-mes {
      padding: 48px 0; text-align: center;
      color: var(--faint); font-size: 12px; letter-spacing: 0.10em;
      text-transform: uppercase; font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar-back">
      <a href="dashboard.html" class="btn-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Dashboard
      </a>
      <div class="period-nav">
        <button id="prev-m" aria-label="Mês anterior">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 6l-6 6 6 6"/></svg>
        </button>
        <span class="per" id="per-label">—</span>
        <button id="next-m" aria-label="Próximo mês">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </div>
    </header>

    <div class="screen" style="padding-top:24px;">
      <div id="content">
        <div class="loading-wrap"><div class="spinner"></div>Carregando</div>
      </div>
    </div>
  </main>

  <script src="_shared.js"></script>
  <script>
    const $ = s => document.querySelector(s);
    let gastos = [], categorias = [], catMap = {};

    // Lê mês/ano da URL ou usa hoje
    const params = new URLSearchParams(window.location.search);
    const hoje   = new Date();
    let curMes = parseInt(params.get('mes')) || hoje.getMonth() + 1;
    let curAno = parseInt(params.get('ano')) || hoje.getFullYear();

    async function init() {
      [gastos, categorias] = await Promise.all([FinTrack.getGastos(), FinTrack.getCategorias()]);
      catMap = FinTrack.buildCatMap(categorias);
      render();
    }

    $('#prev-m').onclick = () => { curMes--; if (curMes < 1) { curMes = 12; curAno--; } render(); };
    $('#next-m').onclick = () => { curMes++; if (curMes > 12) { curMes = 1; curAno++; } render(); };

    function render() {
      $('#per-label').textContent = FinTrack.MESES_LONGO[curMes - 1].slice(0, 3).toUpperCase() + ' ' + curAno;

      const doMes = gastos.filter(g => {
        const { mes: m, ano: a } = FinTrack.mesAnoDe(g.data);
        return m === curMes && a === curAno;
      });

      const total = doMes.reduce((s, g) => s + (Number(g.valor) || 0), 0);
      const qtd   = doMes.length;

      // Agrupa por categoria
      const porCat = {};
      doMes.forEach(g => {
        const id = g.categoria_id;
        if (!porCat[id]) porCat[id] = { lista: [], total: 0, meta: catMap[id] || FinTrack.metaForCategoria('') };
        porCat[id].lista.push(g);
        porCat[id].total += Number(g.valor) || 0;
      });
      const cats = Object.values(porCat).sort((a, b) => b.total - a.total);

      // Donut SVG
      const C = 2 * Math.PI * 42;
      let acc = 0, segs = '';
      cats.forEach(c => {
        const frac = c.total / total;
        const len  = frac * C;
        segs += `<circle cx="60" cy="60" r="42" fill="none" stroke="${c.meta.hex}" stroke-width="14"
                   stroke-dasharray="${len} ${C - len}" stroke-dashoffset="${-acc}"
                   style="opacity:0;transition:stroke-dasharray .8s var(--ease);" data-len="${len}"></circle>`;
        acc += len;
      });

      let html = `
        <!-- Hero -->
        <div class="mes-hero rise">
          <div class="lbl">Total do mês</div>
          <div class="val">${FinTrack.formatBRL(total)}</div>
          <div class="meta">${qtd} gastos · ${cats.length} categorias</div>
        </div>`;

      if (!cats.length) {
        html += '<div class="vazio-mes">Nenhum gasto neste mês</div>';
      } else {
        // Donut
        html += `
          <div class="donut-center rise" style="animation-delay:.06s;">
            <div class="donut">
              <svg viewBox="0 0 120 120" width="120" height="120">
                <circle cx="60" cy="60" r="42" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="14"></circle>
                ${segs}
              </svg>
              <div class="center"><div class="v">${cats.length}</div><div class="l">categ.</div></div>
            </div>
          </div>

          <!-- Blocos por categoria -->
          <div class="cat-blocks">`;

        cats.forEach((c, idx) => {
          const pct  = total > 0 ? Math.round((c.total / total) * 100) : 0;
          const icon = FinTrack.iconForCategoria(c.meta.nome);
          const gastosSorted = [...c.lista].sort((a, b) => (b.data || '').localeCompare(a.data || ''));

          let cgHtml = '';
          gastosSorted.forEach(g => {
            cgHtml += `
              <div class="cg-item">
                <div class="cg-desc">${escapeHtml(g.descricao)}</div>
                <div class="cg-data">${FinTrack.formatData(g.data)}</div>
                <div class="cg-amt">${FinTrack.formatBRL(g.valor)}</div>
              </div>`;
          });

          html += `
            <div class="cat-block" style="animation-delay:${0.05 + idx * 0.04}s;">
              <div class="cat-header">
                <div class="cat-ic" style="color:${c.meta.hex};">${icon}</div>
                <div class="cat-info">
                  <div class="cat-nome">${c.meta.nome || 'Outros'}</div>
                  <div class="cat-total">${FinTrack.formatBRL(c.total)}</div>
                </div>
                <div class="cat-right">
                  <div class="cat-pct" style="color:${c.meta.hex};">${pct}%</div>
                  <div class="cat-qtd">${c.lista.length} gasto${c.lista.length > 1 ? 's' : ''}</div>
                </div>
              </div>
              <div class="prog-track">
                <div class="prog-fill" style="background:${c.meta.hex};" data-pct="${pct}"></div>
              </div>
              <div class="cat-gastos">${cgHtml}</div>
            </div>`;
        });

        html += '</div>';
      }

      $('#content').innerHTML = html;

      requestAnimationFrame(() => {
        // Donut
        setTimeout(() => {
          document.querySelectorAll('.donut circle[data-len]').forEach((c, i) => {
            setTimeout(() => { c.style.opacity = '1'; }, i * 80);
          });
        }, 120);
        // Barras de progresso
        setTimeout(() => {
          document.querySelectorAll('.prog-fill').forEach(el => {
            el.style.width = el.dataset.pct + '%';
          });
        }, 200);
      });
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    }

    init();
  </script>
</body>
</html>
