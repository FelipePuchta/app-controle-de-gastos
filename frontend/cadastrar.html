<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Cadastrar — FinTrack</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="_shared.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Sora', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(255,255,255,0.07);
      border-right: 1px solid rgba(255,255,255,0.07);
    }

    .l-header {
      padding: max(28px, env(safe-area-inset-top) + 16px) 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) 0.05s both;
    }
    .wordmark {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .wordmark strong { color: #FFE600; }
    .back-link {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: rgba(255,255,255,0.65); }

    .hero {
      padding: 52px 28px 0;
      animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) 0.12s both;
    }
    .hero-title {
      font-size: clamp(42px, 13vw, 64px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.88;
      color: #fff;
    }
    .hero-rule {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.18);
      margin: 28px 0;
    }
    .hero-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.38);
      line-height: 1.65;
    }

    .form-wrap {
      flex: 1;
      padding: 40px 28px 0;
      display: flex;
      flex-direction: column;
      animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) 0.28s both;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 56px;
      padding: 0 24px;
      background: #FFE600;
      color: #000;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: none;
      border-radius: 0;
      cursor: pointer;
      transition: filter 0.15s, transform 0.15s;
      margin-top: 8px;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:hover  { filter: brightness(1.06); }
    .arr { font-size: 18px; font-weight: 300; letter-spacing: 0; }

    .form-footer {
      padding: 28px 28px max(40px, env(safe-area-inset-bottom) + 28px);
      text-align: center;
      animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) 0.4s both;
    }
    .form-footer p {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.04em;
    }
    .form-footer a {
      color: #FFE600;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .form-footer a:hover { opacity: 0.70; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="l-header">
      <div class="wordmark"><strong>Fin</strong>Track</div>
      <a href="index.html" class="back-link">← Voltar</a>
    </header>

    <div class="hero">
      <h1 class="hero-title">CADASTRAR</h1>
      <div class="hero-rule"></div>
      <p class="hero-sub">Crie sua conta e comece a controlar seus gastos.</p>
    </div>

    <div class="form-wrap">
      <div class="field">
        <label for="nome">Nome</label>
        <input id="nome" type="text" class="input" placeholder="Seu nome" autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" class="input" placeholder="seu@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input id="senha" type="password" class="input" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <button class="btn-primary" type="button" id="btn-cadastrar">
        <span>Criar conta</span>
        <span class="arr">→</span>
      </button>
    </div>

    <div class="form-footer">
      <p>Já tem conta? <a href="login.html">Entrar</a></p>
    </div>

  </div>

  <script>
    function cadastrar() {
      const nome  = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      if (!nome || !email || !senha) return;
      // TODO: criar usuário no backend quando a tabela de usuários estiver pronta
      window.location.href = 'dashboard.html';
    }
    document.getElementById('btn-cadastrar').onclick = cadastrar;
    document.getElementById('senha').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') cadastrar();
    });
  </script>
</body>
</html>
